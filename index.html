<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bencina Metropolitana</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
    }
    main {
      max-width: 720px;
      padding: 2rem;
      border-radius: 14px;
      background: #111827;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    h1 {
      margin: 0 0 1rem;
      color: #38bdf8;
    }
    p {
      line-height: 1.6;
      margin: 0.65rem 0;
    }
    a {
      color: #22d3ee;
    }
  </style>
</head>
<body>
  <main>
    <h1>Bencina Metropolitana</h1>
    <p>La pagina de GitHub Pages ya esta configurada con un <code>index.html</code>.</p>
    <p>Este repositorio contiene una aplicacion Django; si quieres publicarla completa, se recomienda usar Render, Railway o PythonAnywhere.</p>
    <p>Repositorio: <a href="https://github.com/Paz0422/webBencinaMetropolitana">github.com/Paz0422/webBencinaMetropolitana</a></p>
  </main>
</body>
</html>
